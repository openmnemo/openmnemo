name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation

    env:
      TURBO_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(jq -r .version packages/cli/package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION"
            exit 1
          fi
          echo "✅ Tag matches package version: $PKG_VERSION"

      - name: Verify NPM_TOKEN is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "❌ NPM_TOKEN secret is not configured in repository settings"
            exit 1
          fi
          echo "✅ NPM_TOKEN is present"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Publish all packages
        run: |
          # Capture output; treat "already published" as success (idempotent re-run)
          if ! pnpm publish -r --access public --no-git-checks --provenance 2>&1 | tee /tmp/publish.log; then
            if grep -q "previously published versions" /tmp/publish.log; then
              echo "ℹ️  All packages already published at this version — skipping"
              exit 0
            fi
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
