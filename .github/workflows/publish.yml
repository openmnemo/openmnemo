name: Publish (Manual)

on:
  workflow_dispatch:   # manual trigger only — use release.yml for automated Changesets releases

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation

    env:
      TURBO_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Show package version being published
        run: |
          PKG_VERSION=$(jq -r .version packages/cli/package.json)
          echo "Publishing @openmnemo/* v${PKG_VERSION}"

      - name: Verify NPM_TOKEN is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "❌ NPM_TOKEN secret is not configured in repository settings"
            exit 1
          fi
          echo "✅ NPM_TOKEN is present"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Publish all packages
        run: |
          # Capture output; treat "already published" as success (idempotent re-run)
          if ! pnpm publish -r --access public --no-git-checks --provenance 2>&1 | tee /tmp/publish.log; then
            if grep -q "previously published versions" /tmp/publish.log; then
              echo "ℹ️  All packages already published at this version — skipping"
              exit 0
            fi
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
